<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zodiac Skills — Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f5f0e8;
    --ink: #1a1714;
    --ink-light: #3d3630;
    --ink-wash: #8a8178;
    --ember: #c13d2e;
    --ember-dim: rgba(193, 61, 46, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1000px;
    height: 420px;
    overflow: hidden;
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Paper fiber texture */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.4' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.04;
    pointer-events: none;
    z-index: 10;
    mix-blend-mode: multiply;
  }

  /* Background Chinese characters as watermarks */
  .bg-chars {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: space-around;
    font-family: 'Noto Serif SC', serif;
    font-size: 200px;
    font-weight: 900;
    opacity: 0.04;
    color: var(--ink);
    pointer-events: none;
    overflow: hidden;
  }

  .container {
    display: flex;
    align-items: center;
    gap: 56px;
    z-index: 1;
    padding: 0 56px;
  }

  /* Card */
  .card {
    flex-shrink: 0;
    width: 240px;
    background: var(--paper);
    border: 2px solid var(--ink);
    overflow: hidden;
    position: relative;
    clip-path: polygon(0 0, 98% 0, 100% 2%, 100% 100%, 2% 100%, 0 98%);
  }

  /* Red seal stamp */
  .card::after {
    content: '猴';
    position: absolute;
    bottom: 12px;
    right: 12px;
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    font-weight: 900;
    color: var(--ember);
    width: 28px;
    height: 28px;
    border: 2px solid var(--ember);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    opacity: 0.7;
    z-index: 2;
  }

  .card-header {
    position: relative;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: linear-gradient(135deg, #ece5d8, #f0ebe2);
    border-bottom: 1px solid rgba(26, 23, 20, 0.1);
  }

  .card-header .bg-glyph {
    font-family: 'Noto Serif SC', serif;
    font-size: 160px;
    font-weight: 900;
    position: absolute;
    opacity: 0.07;
    user-select: none;
    line-height: 1;
    color: var(--ink);
  }

  .card-number {
    position: absolute;
    top: 12px;
    right: 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--ink-wash);
    opacity: 0.6;
  }

  .card-header svg {
    position: relative;
    z-index: 1;
    width: 100px;
    height: 100px;
  }

  .card-body {
    padding: 18px 20px;
  }

  .card-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 2px;
    display: flex;
    align-items: baseline;
    gap: 8px;
    color: var(--ink);
  }

  .card-name .chinese {
    font-size: 1.1rem;
    opacity: 0.5;
  }

  .card-persona {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ember);
    margin-bottom: 10px;
  }

  .card-techniques {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 12px;
  }

  .technique-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.55rem;
    padding: 3px 8px;
    border-radius: 0;
    border: 1px solid rgba(26, 23, 20, 0.15);
    color: var(--ink-wash);
    background: var(--ember-dim);
  }

  .card-mechanic {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .mechanic-label {
    color: var(--ink-wash);
  }

  .mechanic-value {
    padding: 2px 10px;
    font-weight: 500;
    background: var(--ember-dim);
    color: var(--ember);
    border: 1px solid rgba(193, 61, 46, 0.15);
  }

  /* Right side */
  .right {
    flex: 1;
  }

  .right h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 14px;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  .right .subtitle {
    font-size: 15px;
    color: var(--ink-wash);
    line-height: 1.55;
    margin-bottom: 12px;
    max-width: 460px;
  }

  /* Ink stroke divider */
  .ink-divider {
    width: 80px;
    height: 3px;
    background: var(--ink);
    margin-bottom: 24px;
    opacity: 0.15;
    border-radius: 0;
    position: relative;
  }
  .ink-divider::after {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    width: 20px;
    height: 3px;
    background: var(--ember);
  }

  .stats {
    display: flex;
    gap: 40px;
  }

  .stat .num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 28px;
    font-weight: 600;
    color: var(--ember);
    line-height: 1;
  }

  .stat .label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.55rem;
    color: var(--ink-wash);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-top: 4px;
  }
</style>
</head>
<body>

<div class="bg-chars">
  <span>猴</span>
  <span>虎</span>
  <span>兔</span>
  <span>龙</span>
</div>

<div class="container">
  <div class="card">
    <div class="card-header">
      <span class="bg-glyph">猴</span>
      <span class="card-number">01/12</span>
      <!-- Monkey SVG — ink wash brush style -->
      <svg viewBox="0 0 120 120" fill="none">
        <circle cx="60" cy="45" r="16" stroke="#ff4d4d" stroke-width="2.5" fill="none"/>
        <circle cx="60" cy="45" r="10" stroke="#ff4d4d" stroke-width="1" fill="none" opacity="0.3"/>
        <circle cx="44" cy="36" r="8" stroke="#ff4d4d" stroke-width="2" fill="none"/>
        <circle cx="76" cy="36" r="8" stroke="#ff4d4d" stroke-width="2" fill="none"/>
        <circle cx="53" cy="42" r="3" fill="#ff4d4d" opacity="0.7"/>
        <circle cx="67" cy="42" r="3" fill="#ff4d4d" opacity="0.7"/>
        <ellipse cx="60" cy="52" rx="6" ry="4" stroke="#ff4d4d" stroke-width="1.5" fill="none"/>
        <path d="M57 51 Q60 54 63 51" stroke="#ff4d4d" stroke-width="1" fill="none"/>
        <path d="M48 58 Q55 65 60 62 Q65 65 72 58" stroke="#ff4d4d" stroke-width="2" fill="none"/>
        <path d="M48 58 Q44 65 42 72" stroke="#ff4d4d" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M72 58 Q76 65 78 72" stroke="#ff4d4d" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M72 62 Q82 58 88 65 Q92 72 86 78 Q80 82 78 76" stroke="#ff4d4d" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M42 72 Q38 76 36 80" stroke="#ff4d4d" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <circle cx="35" cy="82" r="2" stroke="#ff4d4d" stroke-width="1" fill="none"/>
        <circle cx="30" cy="90" r="1" fill="#ff4d4d" opacity="0.2"/>
        <circle cx="85" cy="85" r="1.5" fill="#ff4d4d" opacity="0.15"/>
        <circle cx="45" cy="88" r="0.8" fill="#ff4d4d" opacity="0.1"/>
      </svg>
    </div>
    <div class="card-body">
      <div class="card-name">Monkey <span class="chinese">猴</span></div>
      <div class="card-persona">The Chaos Agent</div>
      <div class="card-techniques">
        <span class="technique-tag">Assumption Flip</span>
        <span class="technique-tag">Hostile Input</span>
        <span class="technique-tag">Delete Probe</span>
        <span class="technique-tag">Scale Shift</span>
        <span class="technique-tag">+5 more</span>
      </div>
      <div class="card-mechanic">
        <span class="mechanic-label">Success:</span>
        <span class="mechanic-value">Survived: yes/no</span>
      </div>
    </div>
  </div>

  <div class="right">
    <h1>The Zodiac</h1>
    <p class="subtitle">Twelve animals. Twelve LLM defaults. Characters fix what instructions can't.</p>
    <div class="ink-divider"></div>
    <div class="stats">
      <div class="stat">
        <div class="num">12</div>
        <div class="label">Animals</div>
      </div>
      <div class="stat">
        <div class="num">12</div>
        <div class="label">Defaults Broken</div>
      </div>
      <div class="stat">
        <div class="num">67</div>
        <div class="label">Techniques</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
