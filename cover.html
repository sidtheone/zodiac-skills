<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zodiac Skills — Cover</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0a0c;
    --card-bg: #111114;
    --border: #1e1e24;
    --text: #e8e6e3;
    --text-dim: #6b6b76;
    --card-color: #ff4d4d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1000px;
    height: 420px;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Background characters — same opacity as cards.html bg-glyph */
  .bg-chars {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: space-around;
    font-family: 'Noto Serif SC', serif;
    font-size: 200px;
    font-weight: 900;
    opacity: 0.06;
    color: var(--text);
    pointer-events: none;
    overflow: hidden;
  }

  .container {
    display: flex;
    align-items: center;
    gap: 56px;
    z-index: 1;
    padding: 0 56px;
  }

  /* Card — exact match to cards.html styles */
  .card {
    flex-shrink: 0;
    width: 240px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .card:hover {
    border-color: var(--card-color);
  }

  .card-header {
    position: relative;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: linear-gradient(135deg, #1a0a0a, #1a1014);
  }

  .card-header .bg-glyph {
    font-family: 'Noto Serif SC', serif;
    font-size: 180px;
    font-weight: 900;
    position: absolute;
    opacity: 0.06;
    user-select: none;
    line-height: 1;
  }

  .card-number {
    position: absolute;
    top: 12px;
    right: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    opacity: 0.5;
  }

  .card-header svg {
    position: relative;
    z-index: 1;
    width: 100px;
    height: 100px;
    filter: drop-shadow(0 4px 24px rgba(0,0,0,0.4));
  }

  .card-body {
    padding: 18px 20px;
  }

  .card-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 2px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .card-name .chinese {
    font-size: 0.95rem;
    opacity: 0.5;
  }

  .card-persona {
    font-size: 0.75rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--card-color);
    margin-bottom: 10px;
  }

  .card-techniques {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 12px;
  }

  .technique-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    padding: 3px 8px;
    border-radius: 100px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    background: rgba(255,255,255,0.02);
  }

  .card-mechanic {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .mechanic-label {
    color: var(--text-dim);
  }

  .mechanic-value {
    padding: 2px 10px;
    border-radius: 4px;
    font-weight: 500;
    background: color-mix(in srgb, var(--card-color) 15%, transparent);
    color: var(--card-color);
  }

  /* Right side */
  .right {
    flex: 1;
  }

  .right h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 46px;
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 14px;
    letter-spacing: -0.02em;
  }

  .right h1 span {
    background: linear-gradient(135deg, #ff4d4d, #ff8c42, #ffd700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .right .subtitle {
    font-size: 15px;
    color: var(--text-dim);
    line-height: 1.55;
    margin-bottom: 24px;
    max-width: 460px;
  }

  .stats {
    display: flex;
    gap: 36px;
  }

  .stat .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 30px;
    font-weight: 700;
    color: var(--card-color);
    line-height: 1;
  }

  .stat .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 4px;
  }
</style>
</head>
<body>

<div class="bg-chars">
  <span>猴</span>
  <span>虎</span>
  <span>兔</span>
  <span>龙</span>
</div>

<div class="container">
  <div class="card">
    <div class="card-header">
      <span class="bg-glyph">猴</span>
      <span class="card-number">01/12</span>
      <!-- Exact SVG from cards.html -->
      <svg viewBox="0 0 120 120" fill="none">
        <circle cx="60" cy="50" r="32" fill="#2a1a1a" stroke="#ff4d4d" stroke-width="2"/>
        <circle cx="60" cy="50" r="24" fill="#1a0f0f"/>
        <circle cx="28" cy="38" r="14" fill="#2a1a1a" stroke="#ff4d4d" stroke-width="1.5"/>
        <circle cx="92" cy="38" r="14" fill="#2a1a1a" stroke="#ff4d4d" stroke-width="1.5"/>
        <circle cx="50" cy="46" r="4" fill="#ff4d4d"/>
        <circle cx="70" cy="46" r="4" fill="#ff4d4d"/>
        <ellipse cx="60" cy="58" rx="8" ry="5" fill="#2a1a1a" stroke="#ff4d4d" stroke-width="1"/>
        <path d="M55 57 Q60 62 65 57" stroke="#ff4d4d" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M60 82 Q60 95 50 105" stroke="#ff4d4d" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M50 105 Q45 110 48 115" stroke="#ff4d4d" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="card-body">
      <div class="card-name">Monkey <span class="chinese">猴</span></div>
      <div class="card-persona">The Chaos Agent</div>
      <div class="card-techniques">
        <span class="technique-tag">Assumption Flip</span>
        <span class="technique-tag">Hostile Input</span>
        <span class="technique-tag">Delete Probe</span>
        <span class="technique-tag">Scale Shift</span>
        <span class="technique-tag">+5 more</span>
      </div>
      <div class="card-mechanic">
        <span class="mechanic-label">Success:</span>
        <span class="mechanic-value">Survived: yes/no</span>
      </div>
    </div>
  </div>

  <div class="right">
    <h1><span>The Zodiac</span></h1>
    <p class="subtitle">Twelve animals. Twelve LLM defaults. Characters fix what instructions can't.</p>
    <div class="stats">
      <div class="stat">
        <div class="num">0/40</div>
        <div class="label">Contradicted</div>
      </div>
      <div class="stat">
        <div class="num">12</div>
        <div class="label">Animals</div>
      </div>
      <div class="stat">
        <div class="num">11</div>
        <div class="label">Showcases</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
